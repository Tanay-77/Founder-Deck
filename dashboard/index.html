<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FounderDeck</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <img src="logo.png" alt="FounderDeck" class="logo-icon">
        <h1>FounderDeck</h1>
      </div>
      
      <div class="search-container">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="searchInput" placeholder="Search by name, role, or bio...">
      </div>
      
      <div class="settings-dropdown">
        <button id="settingsBtn" class="settings-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <div id="settingsMenu" class="dropdown-menu hidden">
          <button id="exportBtn">Export JSON</button>
          <label for="importFile" class="file-upload-label">
            Import JSON
            <input type="file" id="importFile" accept=".json">
          </label>
          <div class="divider"></div>
          <button id="deleteAllBtn" class="danger-btn">Delete All Founders</button>
        </div>
      </div>
    </div>
    
    <div class="filters-container">
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="All">All</button>
        <button class="chip" data-filter="LinkedIn">LinkedIn</button>
        <button class="chip" data-filter="X">X</button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div id="emptyState" class="empty-state hidden">
      <div class="illustration">
        <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </svg>
      </div>
      <h2>No founders saved yet.</h2>
      <p>Visit a LinkedIn or X profile and click the FounderDeck extension to save them here.</p>
      <button class="btn-primary" id="learnHowBtn">Learn How</button>
    </div>

    <div id="gridContainer" class="grid-container">
      <!-- Cards will be injected here via JS -->
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
